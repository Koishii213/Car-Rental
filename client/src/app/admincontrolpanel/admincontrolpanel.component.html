<div style="padding-left: 40px; margin-top: 10px">

  <button type="button" (click)="getAllCarList()" class="btn btn-warning">
    LISTAR TODOS
  </button>

  <button type="button" class="btn btn-warning" (click)="addBtnClicked()">
    ADICIONAR
  </button>

  <button
    type="button"
    [ngClass]="{ 'disabled': seletedCar == null }"
    (click)="editBtnClick()"
    class="btn btn-warning">
    EDITAR
  </button>

  <button
    type="button"
    [ngClass]="{ 'disabled': seletedCar == null }"
    (click)="deleteBtnClick()"
    class="btn btn-warning">
    REMOVER
  </button>

  <app-deletedialog [(visible)]="showDeleteDialog" *ngIf="seletedCar != null">
    <div class="deleteconfirm">
      <p>
        Deseja remover o veículo <b>{{ seletedCar.name }}</b>
        da lista? Essa operação marcará o veículo como indisponível.
      </p>

      <button type="button" (click)="confirmDelete()" class="btn btn-warning">
        SIM
      </button>

      <button type="button" (click)="closeDialog()" class="btn btn-warning">
        NÃO
      </button>
    </div>
  </app-deletedialog>

  <app-deletedialog [(visible)]="showUpdataDialog" *ngIf="seletedCar != null">
    <div>

      <div class="row">
        <div class="col s8 offset-1">
          <div class="card-panel teal lighten-2"></div>

          <form #imageForm="ngForm" (ngSubmit)="onImageSubmit()">
            <img [src]="imageUrl" style="width:150px; height:100px;">

            <input
              class="form-group"
              type="file"
              #EditImage
              accept="image/*"
              (change)="handleFileInput(EditImage.files)">
          </form>
        </div>
      </div>

      <div class="col-md-10">
        <form>

          <div class="form-group">
            <label for="edit-name">Nome do veículo:</label>
            <input
              id="edit-name"
              type="text"
              [(ngModel)]="formCarInfo.name"
              class="form-group col-xs-2"
              name="name"
              placeholder="Digite o nome do veículo"
              required>

            <div>
              <label for="edit-price">Preço:</label>
              <input
                id="edit-price"
                type="number"
                class="form-group col-xs-1"
                [(ngModel)]="formCarInfo.price"
                name="price"
                placeholder="Preço por dia">

              <label for="edit-insurance">Seguro:</label>
              <input
                id="edit-insurance"
                type="number"
                class="form-group col-xs-1"
                [(ngModel)]="formCarInfo.insurance"
                name="insurance"
                placeholder="Seguro por dia">
            </div>
          </div>

          <div>
            <label for="edit-type">Tipo</label>
            <select
              id="edit-type"
              name="type"
              [(ngModel)]="formCarInfo.type"
              class="form-group">

              <option value="Economy">Economy</option>
              <option value="Compact">Compact</option>
              <option value="Standard">Standard</option>
              <option value="SUV">SUV</option>
              <option value="Luxury">Luxury</option>
            </select>

            <label for="edit-passengers">Assentos</label>
            <select
              id="edit-passengers"
              name="passengers"
              [(ngModel)]="formCarInfo.passengers"
              class="form-group">

              <option *ngFor="let i of [2,3,4,5,6,7]" [ngValue]="i">
                {{ i }}
              </option>
            </select>

            <label for="edit-luggage">Bagagens</label>
            <select
              id="edit-luggage"
              name="luggage"
              [(ngModel)]="formCarInfo.luggage"
              class="form-group">

              <option *ngFor="let i of [1,2,3,4]" [ngValue]="i">
                {{ i }}
              </option>
            </select>

            <label for="edit-isAuto">Automático</label>
            <select
              id="edit-isAuto"
              [(ngModel)]="formCarInfo.isAuto"
              name="isAuto"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>

            <label for="edit-ACsup">Ar-condicionado</label>
            <select
              id="edit-ACsup"
              [(ngModel)]="formCarInfo.ACsup"
              name="ACsup"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>

            <label for="edit-isavailable">Disponível</label>
            <select
              id="edit-isavailable"
              [(ngModel)]="formCarInfo.isavailable"
              name="isavailable"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>
          </div>

          <div class="form-group">
            <label for="edit-pickupLoc">Cidade/local de retirada:</label>
            <input
              id="edit-pickupLoc"
              type="text"
              [(ngModel)]="formCarInfo.pickupLoc"
              class="form-control"
              name="pickupLoc"
              required
              placeholder="Ex: Russas, Fortaleza, Jaguaruana">
          </div>

          <div class="updateconfirm">
            <button type="button" (click)="confirmUpdateCarInfo()" class="btn btn-warning">
              SALVAR
            </button>

            <button type="button" (click)="closeDialog()" class="btn btn-warning">
              CANCELAR
            </button>
          </div>

        </form>
      </div>
    </div>
  </app-deletedialog>

  <app-deletedialog [(visible)]="showAddDialog">
    <div>

      <div class="row">
        <div class="col s8 offset-1">
          <div class="card-panel teal lighten-2"></div>

            <input
              class="form-group"
              type="file"
              #AddImage
              accept="image/*"
              (change)="handleFileInput(AddImage.files)">
          </form>
        </div>
      </div>

      <div class="col-md-10">
        <form>

          <div class="form-group">
            <label for="add-name">Nome do veículo:</label>
            <input
              id="add-name"
              type="text"
              [(ngModel)]="formCarInfo.name"
              class="form-group col-xs-2"
              name="name"
              placeholder="Digite o nome do veículo"
              required>

            <label for="add-price">Preço:</label>
            <input
              id="add-price"
              type="number"
              class="form-group col-xs-1"
              [(ngModel)]="formCarInfo.price"
              name="price"
              placeholder="Preço por dia">

            <label for="add-insurance">Seguro:</label>
            <input
              id="add-insurance"
              type="number"
              class="form-group col-xs-1"
              [(ngModel)]="formCarInfo.insurance"
              name="insurance"
              placeholder="Seguro por dia">
          </div>

          <div>
            <label for="add-type">Tipo</label>
            <select
              id="add-type"
              name="type"
              [(ngModel)]="formCarInfo.type"
              class="form-group">

              <option value="Economy">Economy</option>
              <option value="Compact">Compact</option>
              <option value="Standard">Standard</option>
              <option value="SUV">SUV</option>
              <option value="Luxury">Luxury</option>
            </select>

            <label for="add-passengers">Assentos</label>
            <select
              id="add-passengers"
              name="passengers"
              [(ngModel)]="formCarInfo.passengers"
              class="form-group">

              <option *ngFor="let i of [2,3,4,5,6,7]" [ngValue]="i">
                {{ i }}
              </option>
            </select>

            <label for="add-luggage">Bagagens</label>
            <select
              id="add-luggage"
              name="luggage"
              [(ngModel)]="formCarInfo.luggage"
              class="form-group">

              <option *ngFor="let i of [1,2,3,4]" [ngValue]="i">
                {{ i }}
              </option>
            </select>

            <label for="add-isAuto">Automático</label>
            <select
              id="add-isAuto"
              [(ngModel)]="formCarInfo.isAuto"
              name="isAuto"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>

            <label for="add-ACsup">Ar-condicionado</label>
            <select
              id="add-ACsup"
              [(ngModel)]="formCarInfo.ACsup"
              name="ACsup"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>

            <label for="add-isavailable">Disponível</label>
            <select
              id="add-isavailable"
              [(ngModel)]="formCarInfo.isavailable"
              name="isavailable"
              class="form-group">

              <option [ngValue]="true">SIM</option>
              <option [ngValue]="false">NÃO</option>
            </select>
          </div>

          <div class="form-group">
            <label for="add-pickupLoc">Cidade/local de retirada:</label>
            <input
              id="add-pickupLoc"
              type="text"
              [(ngModel)]="formCarInfo.pickupLoc"
              class="form-control"
              name="pickupLoc"
              required
              placeholder="Ex: Russas, Fortaleza, Jaguaruana">
          </div>

          <div class="addconfirm">
            <button type="button" (click)="clickToAddCar()" class="btn btn-warning">
              SALVAR
            </button>

            <button type="button" (click)="closeDialog()" class="btn btn-warning">
              CANCELAR
            </button>
          </div>

        </form>
      </div>
    </div>
  </app-deletedialog>

</div>
