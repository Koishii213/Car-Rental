<div style="padding-left: 40px;margin-top: 10px">
  <button (click)='getAllCarList()' class="btn btn-warning">LIST ALL</button>
  <button class="btn btn-warning" (click)="addBtnClicked()">ADD ONE</button>
  <button [ngClass]="{ 'disabled': seletedCar == null }" (click)="editBtnClick()" class="btn btn-warning">EDIT INFO</button>
  <button [ngClass]="{ 'disabled': seletedCar == null }" (click)="deleteBtnClick()" class="btn btn-warning">REMOVE</button>

  <app-deletedialog [(visible)]="showDeleteDialog" *ngIf="seletedCar != null">
    <div class='deleteconfirm'>
      <p>Really want to delete this <b>{{seletedCar.name}}</b> (ID:{{seletedCar._id}}) from list? This operation is unrecoverable!</p>
    <button (click)="confirmDelete()" class="btn btn-warning">YES</button>
    <button (click)='closeDialog()' class="btn btn-warning">NO</button>
    </div>
  </app-deletedialog>

  <app-deletedialog [(visible)]="showUpdataDialog" *ngIf="seletedCar != null">
    <div>
      <!--<div><p>Preview:</p>-->
        <!--{{imageName}}-->
        <!--<input type="file" (change)="onFileSeleted($event)">-->
        <!--<button type="button" (click)="onUpload()">Upload</button>-->
      <!--</div>-->
      <div class="row">
        <div class="col s8 offset-1">
          <div class="card-panel teal lighten-2">
            <!--<h4 class="center white-text">Image Preview:</h4>-->
          </div>
            <form #imageForm = "ngForm" (ngSubmit)="onImageSubmit(imageForm.value)">

              <img [src]='imageUrl'  style="width:150px; height:100px;">
              <input class="form-group" type="file" #Image accept="image/*"  (change)="handleFileInput($event.target.files)">
              <!--<button type="submit" [disabled]="Image.value ==''" class="btn-large btn-submit">SUBMIT</button>-->

              <!--<div class="row">-->
                <!--<label for="Caption">Caption</label>-->
                <!--<input class="form-group" type="text" #Caption ngModel name="Caption" id="Caption" required placeholder="File name">-->
              <!--</div>-->

            </form>
        </div>
      </div>


      <div class="col-md-10">
        <form>
          <div class="form-group">
            <label for="edit-name">Car name:</label>

            <input id="edit-name" type="text" [(ngModel)]='formCarInfo.name' class="form-group col-xs-2" name="name" placeholder="Enter car name" required>

            <div>
              <label for="edit-price">Price:</label>
              <input id="edit-price" type="text" class="form-group col-xs-1" [(ngModel)]='formCarInfo.price' name="price" placeholder="Price per day">

              <label for="edit-insurance">Insurance:</label>
              <input id="edit-insurance" type="text" class="form-group col-xs-1" [(ngModel)]='formCarInfo.insurance' name="insurance" placeholder="Insurance per day">
            </div><!--style="display:inline"-->
          </div>

          <div>
            <label for="edit-type">Car Type</label>
            <select id="edit-type" name='type' [(ngModel)]='formCarInfo.type' class="form-group">
              <option value="Economy">Economy</option>
              <option value="Compact">Compact</option>
              <option value="Standard">Standard</option>
              <option value="SUV">SUV</option>
              <option value="Luxury">Luxury</option>
            </select>

            <label for="edit-passengers">Seats</label>
            <select id="edit-passengers" name='passengers' [(ngModel)]='formCarInfo.passengers' class="form-group">
              <option *ngFor="let i of [2,3,4,5,6,7]" value='{{i}}'>{{i}}</option>
            </select>

            <label for="edit-luggage">Luggage</label>
            <select id="edit-luggage" name='luggage' [(ngModel)]='formCarInfo.luggage' class="form-group">
              <option *ngFor="let i of [1,2,3,4]" value='{{i}}'>{{i}}</option>
            </select>

            <label for="edit-isAuto">Auto</label>
            <select id="edit-isAuto" [(ngModel)]='formCarInfo.isAuto' name='isAuto' class="form-group">
              <option value='true' [selected]="{true:formCarInfo.isAuto == true, false: formCarInfo.isAuto == false}">YES</option>
              <option value="false" [selected]="{true:formCarInfo.isAuto == true, false: formCarInfo.isAuto == false}">NO</option>
            </select>

            <label for="edit-ACsup">A/C</label>
            <select id="edit-ACsup" [(ngModel)]='formCarInfo.ACsup' name='ACsup' class="form-group">
              <option value='true' [selected]="{true:formCarInfo.ACsup == true, false: formCarInfo.ACsup == false}">YES</option>
              <option value="false" [selected]="{true:formCarInfo.ACsup == true, false: formCarInfo.ACsup == false}">NO</option>
            </select>
          </div>

          <div class="form-group">
            <label for="edit-pickupLoc">Location:</label>
            <input id="edit-pickupLoc" type="text" [(ngModel)]='formCarInfo.pickupLoc' class="form-control" name="pickupLoc" placeholder="Pick Up Location">
          </div>

          <div class='updateconfirm'>
            <button (click)="confirmUpdateCarInfo()" class="btn btn-warning">SAVE</button>
            <button (click)='closeDialog()' class="btn btn-warning">CANCEL</button>
          </div>
        </form>
      </div>
    </div>
  </app-deletedialog>


  <app-deletedialog [(visible)]="showAddDialog" >
    <div>
      <!--<div><p>Preview:</p>-->
      <!--{{imageName}}-->
      <!--<input type="file" (change)="onFileSeleted($event)">-->
      <!--<button type="button" (click)="onUpload()">Upload</button>-->
      <!--</div>-->
      <div class="row">
        <div class="col s8 offset-1">
          <div class="card-panel teal lighten-2">
            <!--<h4 class="center white-text">Image Preview:</h4>-->
          </div>
          <form #imageForm = "ngForm" (ngSubmit)="onImageSubmit(imageForm.value)">

            <img [src]='imageUrl'  style="width:150px; height:100px;">
            <input class="form-group" type="file" #Image accept="image/*"  (change)="handleFileInput($event.target.files)">
            <!--<button type="submit" [disabled]="Image.value ==''" class="btn-large btn-submit">SUBMIT</button>-->

            <!--<div class="row">-->
            <!--<label for="Caption">Caption</label>-->
            <!--<input class="form-group" type="text" #Caption ngModel name="Caption" id="Caption" required placeholder="File name">-->
            <!--</div>-->

          </form>
        </div>
      </div>


      <div class="col-md-10">
        <form>
          <div class="form-group">
            <label for="add-name">Car name:</label>

            <input id="add-name" type="text" [(ngModel)]='formCarInfo.name' class="form-group col-xs-2" name="name" placeholder="Enter car name" required>

            <label for="add-price">Price:</label>
            <input id="add-price" type="text" class="form-group col-xs-1" [(ngModel)]='formCarInfo.price' name="price" placeholder="Price per day">

            <label for="add-insurance">Insurance:</label>
            <input id="add-insurance" type="text" class="form-group col-xs-1" [(ngModel)]='formCarInfo.insurance' name="insurance" placeholder="Insurance per day">
            <!--style="display:inline"-->
          </div>

          <div>
            <label for="add-type">Car Type</label>
            <select id="add-type" name='type' [(ngModel)]='formCarInfo.type' class="form-group">
              <option value="Economy">Economy</option>
              <option value="Compact">Compact</option>
              <option value="Standard">Standard</option>
              <option value="SUV">SUV</option>
              <option value="Luxury">Luxury</option>
            </select>

            <label for="add-passengers">Seats</label>
            <select id="add-passengers" name='passengers' [(ngModel)]='formCarInfo.passengers' class="form-group">
              <option *ngFor="let i of [2,3,4,5,6,7]" value='{{i}}'>{{i}}</option>
            </select>

            <label for="add-luggage">Luggage</label>
            <select id="add-luggage" name='luggage' [(ngModel)]='formCarInfo.luggage' class="form-group">
              <option *ngFor="let i of [1,2,3,4]" value='{{i}}'>{{i}}</option>
            </select>

            <label for="add-isAuto">Auto</label>
            <select id="add-isAuto" [(ngModel)]='formCarInfo.isAuto' name='isAuto' class="form-group">
              <option value='true' [selected]="{true:formCarInfo.isAuto == true, false: formCarInfo.isAuto == false}">YES</option>
              <option value="false" [selected]="{true:formCarInfo.isAuto == true, false: formCarInfo.isAuto == false}">NO</option>
            </select>

            <label for="add-ACsup">A/C</label>
            <select id="add-ACsup" [(ngModel)]='formCarInfo.ACsup' name='ACsup' class="form-group">
              <option value='true' [selected]="{true:formCarInfo.ACsup == true, false: formCarInfo.ACsup == false}">YES</option>
              <option value="false" [selected]="{true:formCarInfo.ACsup == true, false: formCarInfo.ACsup == false}">NO</option>
            </select>
          </div>

          <div class="form-group">
            <label for="add-pickupLoc">Location:</label>
            <input id="add-pickupLoc" type="text" [(ngModel)]='formCarInfo.pickupLoc' class="form-control" name="pickupLoc" required placeholder="Pick Up Location">
          </div>

          <div class='addconfirm'>
            <button (click)="clickToAddCar()" class="btn btn-warning">SAVE</button>
            <button (click)='closeDialog()' class="btn btn-warning">CANCEL</button>
          </div>
        </form>
      </div>
    </div>
  </app-deletedialog>
</div>
