<div class="layout">

  <div class="adminpanel">
    <br>

    <app-admincontrolpanel
      *ngIf="isAdmin"
      (getAll)="getCarlists()"
      [seletedCar]="selectedCar_p">
    </app-admincontrolpanel>

    <br>
  </div>

  <div class="maintenance-buttons">
    <button type="button" (click)="getCarlists()">
      Mostrar todos os veículos
    </button>

    <button type="button" (click)="showCarsInMaintenance()">
      Mostrar veículos em manutenção
    </button>
  </div>

  <div *ngIf="loading">
    <p>Carregando veículos...</p>
  </div>

  <div *ngIf="!loading && total === 0">
    <p>Nenhum veículo disponível foi encontrado para essa cidade/localização.</p>
  </div>

  <div *ngIf="showCards && !loading && total > 0">

    <ul *ngFor="let car of showinglist; let i = index">
      <li
        tabindex="0"
        role="button"
        [ngClass]="{'highlight': selected == i, 'not-highlight': selected != i}"
        (click)="car.isavailable && onSelect(i)"
        (keydown.enter)="car.isavailable && onSelect(i)"
        (keydown.space)="car.isavailable && onSelect(i)">

        <app-card
          [car]="car"
          [favorites]="favorites">
        </app-card>

        <button
          type="button"
          *ngIf="!isCarInMaintenance(car)"
          (click)="$event.stopPropagation(); addCarToMaintenance(car)">
          Adicionar à manutenção
        </button>

        <button
          type="button"
          *ngIf="isCarInMaintenance(car)"
          (click)="$event.stopPropagation(); removeCarFromMaintenance(car)">
          Remover da manutenção
        </button>

      </li>
    </ul>

  </div>

  <app-pagination
    *ngIf="!loading && total > 0"
    (goPage)="goToPage($event)"
    (goNext)="onNext()"
    (goPrev)="onPrev()"
    [pagesToShow]="8"
    [page]="page"
    [perPage]="limit"
    [count]="total">
  </app-pagination>

</div>
